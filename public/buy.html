<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/><title>Buy credits · CHATWITHPDFAI</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
:root{--ink:#15192b;--muted:#5b637d;--line:#e4e7f0;--brand:#3b5bdb;--ok:#0f9d58;--bad:#d23f3f;--bg:#f7f8fc}
*{box-sizing:border-box}body{margin:0;font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
.wrap{max-width:720px;margin:0 auto;padding:40px 20px}h1{font-size:24px;margin:0 0 4px}.sub{color:var(--muted);margin:0 0 18px;font-size:14px}
.bal{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:18px}.bal b{font-size:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.pack{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center}
.pack h3{margin:0 0 4px}.price{font-size:22px;font-weight:700}.cr{color:var(--muted);font-size:14px;margin:4px 0 12px}
button{font:inherit;font-weight:600;color:#fff;background:var(--brand);border:0;border-radius:10px;padding:10px 16px;cursor:pointer;width:100%}button:disabled{opacity:.5}
.status{margin-top:18px;font-size:15px;min-height:20px}.status.ok{color:var(--ok)}.status.bad{color:var(--bad)}
</style></head>
<body><div class="wrap">
  <h1>Buy credits</h1><p class="sub">Pay-per-document. Credits never expire. (Razorpay test mode.)</p>
  <div class="bal">Current balance: <b data-testid="balance">…</b> credits</div>
  <div class="grid" data-testid="packs"></div>
  <div class="status" data-testid="buy-status" role="status"></div>
</div>
<script>
(function(){
  var packsEl=document.querySelector('[data-testid="packs"]'),balEl=document.querySelector('[data-testid="balance"]'),st=document.querySelector('[data-testid="buy-status"]');
  var KEYID=null;
  fetch('/api/auth/me').then(function(r){if(!r.ok){location.href='/signin.html';return null;}return r.json();}).then(function(){return fetch('/api/credits');})
   .then(function(r){return r?r.json():null;}).then(function(j){if(!j)return;balEl.textContent=j.balance;render(j.packs||[]);}).catch(function(){});
  function render(packs){
    packsEl.innerHTML=packs.map(function(p){return '<div class="pack"><h3>'+p.name+'</h3><div class="price">₹'+p.price_inr+'</div><div class="cr">'+p.credits+' credits</div><button type="button" data-testid="buy-'+p.code+'" data-code="'+p.code+'">Buy</button></div>';}).join('');
    Array.prototype.forEach.call(packsEl.querySelectorAll('button[data-code]'),function(b){b.addEventListener('click',function(){buy(b.getAttribute('data-code'),b);});});
  }
  function buy(code,btn){
    st.className='status';st.textContent='Starting checkout…';btn.disabled=true;
    fetch('/api/payments/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({packCode:code})}).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});}).then(function(x){
      if(!x.ok){st.className='status bad';st.textContent='Error: '+(x.j.error||'could not start');btn.disabled=false;return;}
      var o=x.j;
      var rzp=new Razorpay({key:o.keyId,order_id:o.orderId,amount:o.amount,currency:o.currency,name:'CHATWITHPDFAI',description:o.pack.name+' — '+o.pack.credits+' credits',theme:{color:'#3b5bdb'},
        handler:function(resp){
          st.textContent='Confirming payment…';
          fetch('/api/payments/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(resp)}).then(function(r){return r.json();}).then(function(v){
            if(v.ok){st.className='status ok';st.textContent='Added '+v.creditsAdded+' credits. New balance: '+v.balance+'.';balEl.textContent=v.balance;}
            else{st.className='status bad';st.textContent='Verification failed: '+(v.error||'');}
            btn.disabled=false;
          }).catch(function(e){st.className='status bad';st.textContent=e.message;btn.disabled=false;});
        },
        modal:{ondismiss:function(){st.className='status';st.textContent='Checkout cancelled.';btn.disabled=false;}}});
      rzp.open();
    }).catch(function(e){st.className='status bad';st.textContent=e.message;btn.disabled=false;});
  }
})();
</script></body></html>
