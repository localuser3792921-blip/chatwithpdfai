<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found — CHATWITHPDFAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="404">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <PageShell>
          <section style={{ minHeight: "70vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "80px 24px", position: "relative" }}>
            <div className="section-blob" style={{ background: "radial-gradient(circle, var(--violet), transparent 60%)", top: "20%", left: "30%", opacity: 0.5 }}></div>
            <div style={{ textAlign: "center", position: "relative", zIndex: 2, maxWidth: 560 }}>
              <div className="mono" style={{ fontSize: 11, color: "var(--violet-2)", letterSpacing: "0.16em", marginBottom: 12, textTransform: "uppercase" }}>
                Error · 404 · Not Found
              </div>
              <h1 className="display" style={{ fontSize: "clamp(80px, 14vw, 180px)", margin: "8px 0", lineHeight: 0.9 }}>
                <span className="iris">4</span>0<span className="iris">4</span>
              </h1>
              <h2 style={{ fontSize: 24, fontWeight: 600, margin: "12px 0 12px", letterSpacing: "-0.02em" }}>
                This page slipped out of the binder.
              </h2>
              <p style={{ fontSize: 15, color: "var(--text-3)", lineHeight: 1.6, margin: "0 0 28px" }}>
                The URL you tried doesn't match anything we have on file. It may have moved, been renamed, or never existed. The most useful things are below.
              </p>
              <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap", marginBottom: 36 }}>
                <a href="landing.html" className="btn btn-iris">← Back to landing</a>
                <a href="/signup.html" className="btn btn-glass">Open workspace</a>
                <a href="contact.html" className="btn btn-ghost">Tell us what's broken</a>
              </div>
              <div className="glass" style={{ padding: 20, borderRadius: "var(--r-lg)", textAlign: "left" }}>
                <div className="eyebrow" style={{ marginBottom: 14 }}>Try one of these</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {[
                    ["Pricing", "landing.html#pricing"],
                    ["How it works", "landing.html#how"],
                    ["Features", "landing.html#features"],
                    ["Use cases", "landing.html#cases"],
                    ["API documentation", "docs.html"],
                    ["Status page", "status.html"],
                  ].map(([label, href]) => (
                    <a key={href} href={href} style={{ padding: "8px 12px", fontSize: 13, color: "var(--text-2)", borderRadius: 6, transition: "background .15s" }}
                      onMouseEnter={e => e.target.style.background = "var(--glass-2)"} onMouseLeave={e => e.target.style.background = "transparent"}>→ {label}</a>
                  ))}
                </div>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
