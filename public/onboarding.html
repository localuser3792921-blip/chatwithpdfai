<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome to CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Onboarding">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const STEPS = [
      { eyebrow: "Step 1 of 5", title: "Welcome to your workspace.", body: "Three free documents are waiting for you. No card on file, no auto-charge — credits never expire. Let's get you reading.", art: <ArtWelcome />, cta: "Let's go →" },
      { eyebrow: "Step 2 of 5", title: "Choose what you read most.", body: "We'll pre-configure your folders, default summary style, and suggested questions for the kind of documents you work with.", art: <ArtRole />, cta: "Continue →", custom: true },
      { eyebrow: "Step 3 of 5", title: "How citations work.", body: "Every answer is footnoted to the exact page and paragraph. Click a citation — the PDF scrolls and the source paragraph lights up. You can verify in one click.", art: <ArtCitations />, cta: "Got it →" },
      { eyebrow: "Step 4 of 5", title: "Multi-PDF chat.", body: "Drop a folder of documents and ask questions across all of them at once. We tell you which document said what.", art: <ArtFolder />, cta: "Next →" },
      { eyebrow: "Step 5 of 5", title: "You're ready.", body: "Drop a PDF and ask anything. Or use one of our sample documents to try the workflow first.", art: <ArtReady />, cta: "Open workspace →" },
    ];

    const ROLES = [
      { k: "legal", label: "Legal", g: "⚖" },
      { k: "finance", label: "Finance", g: "📈" },
      { k: "research", label: "Research", g: "🔬" },
      { k: "students", label: "Studying", g: "🎓" },
      { k: "healthcare", label: "Healthcare", g: "✚" },
      { k: "developers", label: "Building", g: "⌘" },
    ];

    function App() {
      const [i, setI] = useState(0);
      const [role, setRole] = useState(null);
      const s = STEPS[i];
      const next = () => {
        if (i === STEPS.length - 1) {
          window.location.href = "/signup.html";
        } else {
          setI(i + 1);
        }
      };
      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
          <header style={{ padding: "18px 28px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <a href="landing.html" className="brand"><span className="brand-mark">◇</span>chatwithpdfai<span className="domain">.com</span></a>
            <a href="/signup.html" className="mono" style={{ fontSize: 11, color: "var(--text-3)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Skip tour →</a>
          </header>

          <main style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px 28px 40px" }}>
            <div className="glass glass-iris-border" style={{
              width: "100%", maxWidth: 880, padding: 0, borderRadius: "var(--r-xl)",
              boxShadow: "var(--shadow-card), 0 30px 70px -30px oklch(0.4 0.2 290 / 0.5)",
              overflow: "hidden", display: "grid", gridTemplateColumns: "1.2fr 1fr",
            }} className="onb-card">
              <div style={{ padding: "44px 44px 32px" }}>
                <div className="mono iris" style={{ fontSize: 11, letterSpacing: "0.16em", fontWeight: 700, marginBottom: 14 }}>{s.eyebrow}</div>
                <h1 style={{ fontSize: 30, fontWeight: 600, letterSpacing: "-0.025em", lineHeight: 1.1, margin: "4px 0 14px" }}>{s.title}</h1>
                <p style={{ fontSize: 15, color: "var(--text-3)", lineHeight: 1.6, margin: "0 0 22px" }}>{s.body}</p>
                {s.custom && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 22 }}>
                    {ROLES.map(r => (
                      <button key={r.k} onClick={() => setRole(r.k)} className="glass hover-glow" style={{
                        padding: "16px 12px", borderRadius: "var(--r)", cursor: "pointer", textAlign: "center",
                        border: role === r.k ? "1px solid var(--violet)" : "1px solid var(--stroke-2)",
                        background: role === r.k ? "rgba(183,106,255,0.1)" : "var(--glass-1)",
                        fontFamily: "var(--sans)", color: "var(--text)",
                      }}>
                        <div style={{ fontSize: 22, marginBottom: 6 }}>{r.g}</div>
                        <div style={{ fontSize: 12.5, fontWeight: 500 }}>{r.label}</div>
                      </button>
                    ))}
                  </div>
                )}

                <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 24 }}>
                  {STEPS.map((_, idx) => (
                    <div key={idx} style={{
                      width: idx === i ? 24 : 6, height: 6,
                      borderRadius: 3,
                      background: idx <= i ? "var(--grad-iris-2)" : "var(--glass-2)",
                      transition: "all .25s",
                    }}></div>
                  ))}
                  <div style={{ flex: 1 }}></div>
                  {i > 0 && <button onClick={() => setI(i - 1)} className="btn btn-glass btn-sm">← Back</button>}
                  <button onClick={next} className="btn btn-iris" disabled={s.custom && !role}>{s.cta}</button>
                </div>
              </div>
              <div style={{ background: "linear-gradient(135deg, oklch(0.22 0.15 280 / 0.5), oklch(0.18 0.12 200 / 0.3))", padding: 28, position: "relative", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ position: "absolute", inset: 20, border: "1px dashed rgba(255,255,255,0.1)", borderRadius: 14 }}></div>
                <div style={{ position: "relative", zIndex: 2, width: "100%" }}>
                  {s.art}
                </div>
              </div>
            </div>
          </main>
          <style>{`@media (max-width: 720px) { .onb-card { grid-template-columns: 1fr !important; } .onb-card > div:last-child { min-height: 240px; } }`}</style>
        </div>
      );
    }

    function ArtWelcome() {
      return (
        <div style={{ textAlign: "center" }}>
          <div className="iris" style={{ fontSize: 80, lineHeight: 1, fontWeight: 700, letterSpacing: "-0.04em" }}>3</div>
          <div className="mono" style={{ fontSize: 11, color: "var(--text-3)", letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 8 }}>FREE DOCUMENTS</div>
          <div style={{ marginTop: 22, padding: "12px 16px", background: "rgba(126,255,157,0.12)", border: "1px solid rgba(126,255,157,0.3)", borderRadius: "var(--r-pill)", display: "inline-flex", gap: 8, alignItems: "center" }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--green)" }}></div>
            <span style={{ fontSize: 12.5, color: "var(--green)", fontWeight: 500 }}>No card · No expiry · No subscription</span>
          </div>
        </div>
      );
    }
    function ArtRole() {
      return (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10, justifyContent: "center" }}>
          {["⚖", "📈", "🔬", "🎓", "✚", "⌘"].map((g, i) => (
            <div key={i} className="glass" style={{ width: 60, height: 60, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, animation: `fadeUp .4s ease ${i * 0.08}s both` }}>{g}</div>
          ))}
        </div>
      );
    }
    function ArtCitations() {
      return (
        <div className="glass" style={{ padding: "14px 16px", borderRadius: "var(--r-lg)" }}>
          <div style={{ alignSelf: "flex-end", padding: "8px 12px", background: "var(--grad-iris-2)", borderRadius: "14px 14px 4px 14px", color: "#fff", fontSize: 12, marginBottom: 8, display: "inline-block", float: "right" }}>What's the cap?</div>
          <div style={{ clear: "both" }}></div>
          <div className="glass" style={{ padding: "10px 12px", borderRadius: "14px 14px 14px 4px", fontSize: 12, lineHeight: 1.5, marginTop: 6 }}>
            <strong style={{ color: "var(--text)" }}>2× annual fees</strong>, with carve-outs. <span className="fn">¹ p.47</span>
          </div>
          <div className="mono" style={{ fontSize: 9, letterSpacing: "0.08em", color: "var(--green)", marginTop: 10, textAlign: "center" }}>● CITED IN 1.4s</div>
        </div>
      );
    }
    function ArtFolder() {
      return (
        <div style={{ position: "relative", height: 160 }}>
          {[0, 1, 2].map(i => (
            <div key={i} className="glass" style={{
              position: "absolute",
              top: i * 14, left: i * 12,
              width: 200, height: 60,
              borderRadius: 10,
              padding: "10px 14px",
            }}>
              <div className="mono" style={{ fontSize: 9, color: "var(--text-3)", letterSpacing: "0.12em" }}>DOC {i + 1} · {["MSA", "10-Q", "PAPER"][i]}</div>
              <div style={{ height: 4, width: "70%", background: "var(--glass-2)", borderRadius: 2, marginTop: 6 }}></div>
              <div style={{ height: 4, width: "50%", background: "var(--glass-2)", borderRadius: 2, marginTop: 4 }}></div>
            </div>
          ))}
        </div>
      );
    }
    function ArtReady() {
      return (
        <div style={{ textAlign: "center" }}>
          <div style={{ width: 72, height: 72, borderRadius: 18, background: "var(--grad-iris-2)", margin: "0 auto 14px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, color: "#fff", boxShadow: "0 14px 32px -10px oklch(0.55 0.22 290 / 0.7)" }}>↑</div>
          <div style={{ fontSize: 15, fontWeight: 600 }}>Drop your first PDF</div>
          <div className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", letterSpacing: "0.1em", marginTop: 4 }}>OR USE A SAMPLE DOCUMENT</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
