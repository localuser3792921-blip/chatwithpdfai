<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pricing — CHATWITHPDFAI</title>
  <meta name="description" content="Pay-per-document credit packs. No subscription. Credits never expire. From $5 for 50 documents." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Pricing">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const PACKS = [
      { name: "Reader", price: 5, docs: 50, per: "$0.10", seats: 1, features: ["All features unlocked", "Credits never expire", "70+ languages, OCR included", "Multi-PDF chat (5 docs)", "Markdown export", "Email support"], excluded: ["Word / Notion export", "SSO / audit logs", "HIPAA / BAA"] },
      { name: "Practice", price: 29, docs: 400, per: "$0.07", seats: 3, featured: true, features: ["Everything in Reader", "3 user seats", "Shared folders & history", "Priority OCR queue", "Word / Notion / Markdown export", "API access (300 RPM)", "Priority email support"], excluded: ["SSO / audit logs", "HIPAA / BAA", "Custom data residency"] },
      { name: "Chamber", price: 119, docs: 2500, per: "$0.05", seats: 15, features: ["Everything in Practice", "15 user seats", "SSO + SAML", "Audit logs", "BAA / HIPAA alignment", "Custom data residency", "Dedicated support engineer", "Phone support", "Custom DPA"] },
    ];

    function App() {
      return (
        <PageShell active="pricing">
          {/* Hero */}
          <section style={{ padding: "60px 0 20px", position: "relative" }}>
            <div className="section-blob" style={{ background: "radial-gradient(circle, var(--violet), transparent 60%)", top: 60, right: -100, opacity: 0.35 }}></div>
            <div className="spread" style={{ textAlign: "center", position: "relative", zIndex: 2 }}>
              <div className="section-eyebrow" style={{ justifyContent: "center" }}>Pricing</div>
              <h1 className="section-title" style={{ fontSize: "clamp(40px, 6vw, 72px)", margin: "16px auto 14px", maxWidth: 900 }}>
                Pay per document. <span className="iris">Spend slowly.</span>
              </h1>
              <p className="section-lede" style={{ margin: "0 auto", maxWidth: 580 }}>
                One credit reads one PDF, however many pages and questions. Credits never expire. No subscription.
              </p>
            </div>
          </section>

          {/* Plans */}
          <section style={{ padding: "20px 0 40px" }}>
            <div className="spread">
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }} className="price-grid">
                {PACKS.map(p => (
                  <div key={p.name} className={`glass ${p.featured ? "glass-iris-border" : ""}`} style={{
                    padding: "36px 30px", borderRadius: "var(--r-xl)",
                    background: p.featured ? "linear-gradient(180deg, rgba(183,106,255,0.12), rgba(78,163,255,0.06))" : "var(--glass-1)",
                    position: "relative", display: "flex", flexDirection: "column",
                    boxShadow: p.featured ? "0 30px 60px -20px oklch(0.4 0.2 290 / 0.5)" : undefined,
                  }}>
                    {p.featured && (
                      <div style={{ position: "absolute", top: -14, right: 24, padding: "5px 12px", background: "var(--grad-iris-2)", borderRadius: "var(--r-pill)", fontSize: 11, fontWeight: 600, color: "#fff", letterSpacing: "0.04em", boxShadow: "0 6px 18px -6px oklch(0.55 0.22 290 / 0.6)" }}>Most popular</div>
                    )}
                    <h3 style={{ fontSize: 22, margin: 0, fontWeight: 600, color: "var(--text)" }}>{p.name}</h3>
                    <p style={{ fontSize: 12.5, margin: "4px 0 24px", color: "var(--text-3)" }}>{p.seats} seat{p.seats > 1 ? "s" : ""} · {p.per}/doc · No expiry</p>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 4 }}>
                      <span style={{ fontSize: 60, lineHeight: 0.9, fontWeight: 500, letterSpacing: "-0.04em", color: "var(--text)" }}>${p.price}</span>
                      <span className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>USD · ONCE</span>
                    </div>
                    <div className="mono" style={{ fontSize: 11, letterSpacing: "0.1em", color: "var(--violet-2)", marginBottom: 22 }}>
                      ◉ {p.docs.toLocaleString()} DOCUMENTS
                    </div>
                    <ul style={{ listStyle: "none", padding: 0, margin: "0 0 28px", flex: 1 }}>
                      {p.features.map(ft => (
                        <li key={ft} style={{ padding: "8px 0", borderTop: "1px solid var(--stroke-1)", fontSize: 13.5, color: "var(--text-2)", display: "flex", gap: 10 }}>
                          <span style={{ color: "var(--green)", flexShrink: 0 }}>✓</span><span>{ft}</span>
                        </li>
                      ))}
                      {p.excluded?.map(ft => (
                        <li key={ft} style={{ padding: "8px 0", borderTop: "1px solid var(--stroke-1)", fontSize: 13.5, color: "var(--text-4)", display: "flex", gap: 10 }}>
                          <span style={{ flexShrink: 0 }}>—</span><span style={{ textDecoration: "line-through" }}>{ft}</span>
                        </li>
                      ))}
                    </ul>
                    <a href="/buy.html" className={p.featured ? "btn btn-iris" : "btn btn-glass"} style={{ width: "100%", justifyContent: "center" }}>
                      Get {p.name} →
                    </a>
                  </div>
                ))}
              </div>

              <div className="glass" style={{ marginTop: 24, padding: "20px 24px", borderRadius: "var(--r-lg)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 20, flexWrap: "wrap" }}>
                <div>
                  <div className="eyebrow" style={{ marginBottom: 4 }}>Free tier</div>
                  <p style={{ margin: 0, fontSize: 15, color: "var(--text)" }}>
                    <strong>3 documents free.</strong> No card required.
                  </p>
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <a href="/signup.html" className="btn btn-iris">Start free →</a>
                  <a href="contact.html" className="btn btn-glass">Talk to sales</a>
                </div>
              </div>
              <style>{`@media (max-width: 900px) { .price-grid { grid-template-columns: 1fr !important; } }`}</style>
            </div>
          </section>

          {/* ROI calculator */}
          <section style={{ padding: "60px 0", position: "relative" }}>
            <div className="spread">
              <div className="section-eyebrow">Estimate</div>
              <h2 className="section-title" style={{ fontSize: 38 }}>How much will <span className="iris">you actually pay?</span></h2>
              <p className="section-lede">Drag the slider. We'll suggest the cheapest plan.</p>
              <Calculator />
            </div>
          </section>

          {/* Comparison */}
          <section style={{ padding: "60px 0" }}>
            <div className="spread">
              <div className="section-eyebrow">Plan comparison</div>
              <h2 className="section-title" style={{ fontSize: 38 }}>Every feature, side by side.</h2>
              <div className="glass" style={{ borderRadius: "var(--r-xl)", overflow: "hidden", marginTop: 24 }}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 720 }}>
                    <thead>
                      <tr style={{ background: "rgba(0,0,0,0.2)" }}>
                        <th style={th("left")}>Feature</th>
                        <th style={th("center")}>Reader</th>
                        <th style={{ ...th("center"), background: "linear-gradient(180deg, rgba(183,106,255,0.18), transparent)" }}>
                          <span className="iris" style={{ fontWeight: 700 }}>Practice</span>
                        </th>
                        <th style={th("center")}>Chamber</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ["Documents per pack", "50", "400", "2,500"],
                        ["Price per document", "$0.10", "$0.07", "$0.05"],
                        ["Seats", "1", "3", "15"],
                        ["Multi-PDF chat", "5 docs", "Unlimited", "Unlimited"],
                        ["Max document size", "2,000 pp", "2,000 pp", "10,000 pp"],
                        ["OCR included", true, true, true],
                        ["Citations", true, true, true],
                        ["Markdown export", true, true, true],
                        ["Word / Notion export", false, true, true],
                        ["API access", false, "300 RPM", "Unlimited"],
                        ["Webhooks", false, true, true],
                        ["Audit logs", false, false, true],
                        ["SSO / SAML", false, false, true],
                        ["HIPAA / BAA", false, false, true],
                        ["Custom data residency", false, false, true],
                        ["Support", "Email", "Priority email", "Dedicated · phone"],
                      ].map((r, i) => (
                        <tr key={i} style={{ borderTop: "1px solid var(--stroke-1)" }}>
                          {r.map((c, ci) => (
                            <td key={ci} style={ci === 0 ? td("left", { color: "var(--text)", fontWeight: 500 }) : td("center", ci === 2 ? { background: "rgba(183,106,255,0.06)" } : {})}>{cell(c)}</td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>

          {/* FAQ */}
          <Faq />

          {/* CTA */}
          <section style={{ padding: "80px 0", position: "relative" }}>
            <div className="section-blob" style={{ background: "radial-gradient(circle, var(--violet), transparent 60%)", top: "30%", left: "40%", width: 700, height: 700, opacity: 0.4 }}></div>
            <div className="spread" style={{ textAlign: "center", position: "relative", zIndex: 2 }}>
              <h2 className="display" style={{ fontSize: "clamp(36px, 5vw, 60px)", margin: "0 auto 18px", maxWidth: 760, lineHeight: 1.05 }}>
                Buy when you need it.<br /><span className="iris">Never again, until you do.</span>
              </h2>
              <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                <a href="/signup.html" className="btn btn-iris btn-lg">Start free →</a>
                <a href="contact.html" className="btn btn-glass btn-lg">Talk to sales</a>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }

    function Calculator() {
      const [docs, setDocs] = React.useState(80);
      const rec = docs <= 50 ? PACKS[0] : docs <= 400 ? PACKS[1] : PACKS[2];
      const cost = (docs * parseFloat(rec.per.slice(1))).toFixed(2);
      return (
        <div className="glass" style={{ padding: 32, borderRadius: "var(--r-xl)", marginTop: 24 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 36, alignItems: "center" }} className="calc-grid">
            <div>
              <div className="eyebrow" style={{ marginBottom: 10 }}>Documents per year</div>
              <div className="iris" style={{ fontSize: 64, fontWeight: 600, lineHeight: 1, letterSpacing: "-0.03em", marginBottom: 18 }}>{docs.toLocaleString()}</div>
              <input type="range" min={10} max={3000} step={10} value={docs} onChange={e => setDocs(+e.target.value)} style={{ width: "100%", accentColor: "var(--violet)" }} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 11, color: "var(--text-4)", fontFamily: "var(--mono)" }}>
                <span>10</span><span>1,500</span><span>3,000</span>
              </div>
            </div>
            <div style={{ borderLeft: "1px solid var(--stroke-1)", paddingLeft: 32 }}>
              <div className="eyebrow" style={{ marginBottom: 10 }}>You should buy</div>
              <div style={{ fontSize: 28, fontWeight: 600, marginBottom: 6 }}>{rec.name} pack</div>
              <div style={{ fontSize: 13, color: "var(--text-3)", marginBottom: 18 }}>{rec.docs.toLocaleString()} docs · ${rec.price} once</div>
              <div className="eyebrow" style={{ marginBottom: 6 }}>Annual cost</div>
              <div style={{ fontSize: 32, fontWeight: 600, marginBottom: 8 }}>${cost}</div>
              <div className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", letterSpacing: "0.06em" }}>VS. SUBSCRIPTION TOOLS: $240-$840/yr</div>
              <a href="/buy.html" className="btn btn-iris" style={{ marginTop: 18, width: "100%", justifyContent: "center" }}>Buy {rec.name} pack →</a>
            </div>
          </div>
          <style>{`@media (max-width: 760px) { .calc-grid { grid-template-columns: 1fr !important; } .calc-grid > div:last-child { border-left: none !important; padding-left: 0 !important; border-top: 1px solid var(--stroke-1); padding-top: 24px !important; } }`}</style>
        </div>
      );
    }

    function Faq() {
      const [open, setOpen] = React.useState(0);
      const ITEMS = [
        ["What counts as one credit?", "One credit lets you upload and chat with one document, however many questions you ask. A 12-page contract and a 1,200-page filing both cost one credit. OCR for scanned PDFs is included."],
        ["Do credits expire?", "No. Credits never expire. We do not run a subscription you have to remember to cancel."],
        ["Can I get a refund?", "Yes. We refund unused credits within 30 days of purchase, no questions asked."],
        ["What if I run out?", "Buy another pack. Credits stack — they don't reset. You're never auto-charged."],
        ["Do you offer student discounts?", "The Reader pack ($5 for 50 documents) is already at a price point most students find reasonable. We're working on a verified-student program for 50% off."],
        ["Is there a free plan?", "Yes. 3 documents free, no card. No expiry on those either."],
        ["Can my team share credits?", "Yes on Practice (3 seats) and Chamber (15 seats). All seats draw from the same credit pool."],
        ["What payment methods do you accept?", "All major cards via Stripe. Wire transfer available on Chamber and above."],
      ];
      return (
        <section style={{ padding: "60px 0" }}>
          <div className="spread">
            <div className="section-eyebrow">Pricing FAQ</div>
            <h2 className="section-title" style={{ fontSize: 38 }}>Common questions.</h2>
            <div className="glass" style={{ borderRadius: "var(--r-xl)", overflow: "hidden", marginTop: 24 }}>
              {ITEMS.map(([q, a], i) => (
                <div key={i} style={{ borderBottom: i < ITEMS.length - 1 ? "1px solid var(--stroke-1)" : "none" }}>
                  <button onClick={() => setOpen(open === i ? -1 : i)} style={{ width: "100%", textAlign: "left", background: "transparent", border: "none", padding: "18px 26px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 20, color: "var(--text)", fontFamily: "var(--sans)" }}>
                    <span style={{ fontSize: 15, fontWeight: 500 }}>{q}</span>
                    <span style={{ fontSize: 22, color: "var(--violet-2)", lineHeight: 1, transform: open === i ? "rotate(45deg)" : "rotate(0)", transition: "transform .2s", flexShrink: 0 }}>+</span>
                  </button>
                  {open === i && <div style={{ padding: "0 26px 20px", fontSize: 14, color: "var(--text-3)", lineHeight: 1.6, maxWidth: 760, animation: "fadeUp .2s ease" }}>{a}</div>}
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function cell(v) {
      if (v === true) return <span style={{ color: "var(--green)", fontSize: 16 }}>✓</span>;
      if (v === false) return <span style={{ color: "var(--text-4)", fontSize: 16 }}>—</span>;
      return <span style={{ fontSize: 13, color: "var(--text-2)" }}>{v}</span>;
    }
    function th(align) { return { textAlign: align, padding: "14px 18px", fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 500, color: "var(--text-3)" }; }
    function td(align, extra = {}) { return { textAlign: align, padding: "12px 18px", fontSize: 13, color: "var(--text-2)", verticalAlign: "middle", ...extra }; }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
