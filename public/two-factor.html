<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Two-factor authentication — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="2FA setup">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const { useState, useRef } = React;
    const CODES = ["8H29-K7QR", "PX4M-2VWB", "9JDF-LR3X", "TYNB-86CG", "Q4XA-PEHM", "ZD2K-RJ8F", "LMW7-3GVQ", "6HRT-NXCD"];
    const STEPS = ["Choose method", "Scan QR", "Verify code", "Backup codes", "Done"];

    function App() {
      const [step, setStep] = useState(0);
      const [code, setCode] = useState(["", "", "", "", "", ""]);
      const [copied, setCopied] = useState(false);
      const refs = useRef([]);
      const onCode = (i, v) => {
        if (!/^\d?$/.test(v)) return;
        const next = [...code]; next[i] = v;
        setCode(next);
        if (v && i < 5) refs.current[i + 1]?.focus();
      };
      const filled = code.every(c => c !== "");

      return (
        <PageShell>
          <section style={{ padding: "40px 0 80px" }}>
            <div className="spread" style={{ maxWidth: 720 }}>
              <a href="account.html" className="btn btn-glass btn-sm" style={{ marginBottom: 16 }}>← Account settings</a>
              <h1 style={{ fontSize: 30, fontWeight: 600, letterSpacing: "-0.025em", margin: "0 0 8px" }}>Set up two-factor authentication</h1>
              <p style={{ fontSize: 14, color: "var(--text-3)", margin: "0 0 28px" }}>An extra layer of protection: even if your password is compromised, an attacker can't sign in without this second factor.</p>

              {/* Progress dots */}
              <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 32 }}>
                {STEPS.map((s, i) => (
                  <React.Fragment key={i}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 22, height: 22, borderRadius: "50%", background: i < step ? "var(--green)" : i === step ? "var(--grad-iris-2)" : "var(--glass-2)", border: i === step ? "none" : "1px solid var(--stroke-2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: i <= step ? "#fff" : "var(--text-4)" }}>{i < step ? "✓" : i + 1}</div>
                      <span className="mono" style={{ fontSize: 10.5, color: i === step ? "var(--text)" : "var(--text-4)", letterSpacing: "0.06em", textTransform: "uppercase" }}>{s}</span>
                    </div>
                    {i < STEPS.length - 1 && <div style={{ flex: 1, height: 1, background: i < step ? "var(--green)" : "var(--stroke-2)" }}></div>}
                  </React.Fragment>
                ))}
              </div>

              <div className="glass glass-iris-border" style={{ padding: 36, borderRadius: "var(--r-xl)" }}>
                {step === 0 && (
                  <div>
                    <h2 style={{ fontSize: 22, fontWeight: 600, margin: "0 0 8px" }}>Choose a method</h2>
                    <p style={{ fontSize: 13.5, color: "var(--text-3)", margin: "0 0 22px" }}>We recommend an authenticator app — works offline, no SIM-swap risk.</p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      {[
                        { k: "app", t: "Authenticator app", d: "1Password, Authy, Google Authenticator, Microsoft Authenticator", rec: true },
                        { k: "key", t: "Hardware security key", d: "YubiKey, Titan, or platform passkey (WebAuthn)" },
                        { k: "sms", t: "SMS text message", d: "Less secure — vulnerable to SIM swap. Last resort." },
                      ].map(m => (
                        <button key={m.k} onClick={() => m.k === "app" && setStep(1)} className="glass hover-glow" style={{ padding: "16px 18px", borderRadius: "var(--r)", textAlign: "left", cursor: "pointer", border: m.rec ? "1px solid var(--violet)" : "1px solid var(--stroke-2)", background: m.rec ? "rgba(183,106,255,0.06)" : "var(--glass-1)", fontFamily: "var(--sans)", color: "var(--text)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
                              {m.t} {m.rec && <span className="pill" style={{ padding: "2px 8px", fontSize: 9.5, color: "var(--violet-2)", border: "1px solid var(--violet)" }}>RECOMMENDED</span>}
                            </div>
                            <div style={{ fontSize: 12, color: "var(--text-3)", marginTop: 4 }}>{m.d}</div>
                          </div>
                          <span style={{ color: "var(--violet-2)", fontSize: 18 }}>→</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {step === 1 && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32, alignItems: "center" }} className="twofa-qr">
                    <div>
                      <h2 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 10px" }}>Scan the QR code</h2>
                      <p style={{ fontSize: 13, color: "var(--text-3)", margin: "0 0 16px", lineHeight: 1.55 }}>Open your authenticator app and tap the + button. Scan this code to add CHATWITHPDFAI.</p>
                      <div className="eyebrow" style={{ marginBottom: 8 }}>Or paste this secret manually</div>
                      <div className="glass" style={{ padding: "10px 14px", borderRadius: "var(--r)", display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
                        <span className="mono" style={{ flex: 1, fontSize: 12, color: "var(--text)", letterSpacing: "0.1em" }}>JBSWY3DPEHPK3PXP</span>
                        <button onClick={() => { navigator.clipboard?.writeText("JBSWY3DPEHPK3PXP"); window.cwpaToast?.({ kind: "success", title: "Secret copied" }); }} className="btn btn-glass btn-sm">Copy</button>
                      </div>
                      <button onClick={() => setStep(2)} className="btn btn-iris" style={{ width: "100%", justifyContent: "center" }}>I've scanned it →</button>
                    </div>
                    <div style={{ textAlign: "center" }}>
                      <div className="glass" style={{ width: 200, height: 200, margin: "0 auto", padding: 14, borderRadius: "var(--r-lg)", background: "#fff" }}>
                        <svg viewBox="0 0 25 25" width="100%" height="100%" shapeRendering="crispEdges" style={{ display: "block" }}>
                          {/* Decorative QR */}
                          <rect width="25" height="25" fill="#fff"/>
                          {[[1,1,5,5],[19,1,5,5],[1,19,5,5]].map(([x,y,w,h],i)=>(
                            <g key={i}>
                              <rect x={x} y={y} width={w} height={h} fill="#0a0a25"/>
                              <rect x={x+1} y={y+1} width={w-2} height={h-2} fill="#fff"/>
                              <rect x={x+2} y={y+2} width={w-4} height={h-4} fill="#0a0a25"/>
                            </g>
                          ))}
                          {/* random data cells */}
                          {Array.from({length: 100}).map((_, i) => {
                            const x = 7 + (i * 7) % 11;
                            const y = 7 + Math.floor((i * 7) / 11);
                            if (y > 17) return null;
                            return (i * 13 % 3 === 0) ? <rect key={i} x={x} y={y} width="1" height="1" fill="#0a0a25"/> : null;
                          })}
                          {Array.from({length: 60}).map((_, i) => {
                            const x = 1 + (i * 5) % 23;
                            const y = 8 + Math.floor((i * 5) / 23) * 2;
                            if (x < 7 && y < 7) return null;
                            return (i * 17 % 4 === 0) ? <rect key={"a"+i} x={x} y={y} width="1" height="1" fill="#0a0a25"/> : null;
                          })}
                        </svg>
                      </div>
                      <div className="mono" style={{ fontSize: 10, color: "var(--text-3)", letterSpacing: "0.14em", marginTop: 10 }}>otpauth://totp/cwpa</div>
                    </div>
                    <style>{`@media (max-width: 700px) { .twofa-qr { grid-template-columns: 1fr !important; } }`}</style>
                  </div>
                )}

                {step === 2 && (
                  <div>
                    <h2 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 10px" }}>Verify the code</h2>
                    <p style={{ fontSize: 13, color: "var(--text-3)", margin: "0 0 22px" }}>Enter the 6-digit code from your authenticator app to confirm it's set up correctly.</p>
                    <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 22 }}>
                      {code.map((c, i) => (
                        <input key={i} ref={el => refs.current[i] = el} value={c} onChange={e => onCode(i, e.target.value)} onKeyDown={e => { if (e.key === "Backspace" && !c && i > 0) refs.current[i - 1]?.focus(); }} maxLength={1} className="input" style={{ width: 52, height: 60, textAlign: "center", fontSize: 24, fontFamily: "var(--mono)", fontWeight: 600, padding: 0 }} />
                      ))}
                    </div>
                    <button onClick={() => filled && setStep(3)} disabled={!filled} className="btn btn-iris" style={{ width: "100%", padding: "12px 16px", justifyContent: "center", opacity: filled ? 1 : 0.5 }}>Verify & continue →</button>
                  </div>
                )}

                {step === 3 && (
                  <div>
                    <h2 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 10px" }}>Save your backup codes</h2>
                    <p style={{ fontSize: 13, color: "var(--text-3)", margin: "0 0 20px", lineHeight: 1.55 }}>
                      If you lose access to your authenticator, use any of these one-time codes to sign in. Keep them somewhere safe — a password manager is ideal. <strong style={{ color: "var(--text-2)" }}>We don't show them again.</strong>
                    </p>
                    <div className="glass" style={{ padding: 20, borderRadius: "var(--r-lg)", marginBottom: 18 }}>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, fontFamily: "var(--mono)", fontSize: 14 }}>
                        {CODES.map((c, i) => (
                          <div key={c} style={{ padding: "8px 12px", background: "var(--glass-2)", border: "1px solid var(--stroke-2)", borderRadius: 6, color: "var(--text)", letterSpacing: "0.06em" }}>
                            <span style={{ color: "var(--text-4)", marginRight: 8, fontSize: 11 }}>{String(i + 1).padStart(2, "0")}</span>{c}
                          </div>
                        ))}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
                      <button onClick={() => { navigator.clipboard?.writeText(CODES.join("\n")); setCopied(true); window.cwpaToast?.({ kind: "success", title: "8 codes copied" }); }} className="btn btn-glass" style={{ flex: 1, justifyContent: "center" }}>{copied ? "✓ Copied" : "📋 Copy all"}</button>
                      <button className="btn btn-glass" style={{ flex: 1, justifyContent: "center" }}>↓ Download .txt</button>
                      <button className="btn btn-glass" style={{ flex: 1, justifyContent: "center" }}>🖨 Print</button>
                    </div>
                    <label style={{ display: "flex", gap: 10, padding: "12px 14px", background: "var(--glass-1)", borderRadius: "var(--r)", marginBottom: 18, fontSize: 12.5, color: "var(--text-2)", alignItems: "center" }}>
                      <input type="checkbox" id="saved" />
                      <span>I've saved these codes somewhere safe. I understand they won't be shown again.</span>
                    </label>
                    <button onClick={() => setStep(4)} className="btn btn-iris" style={{ width: "100%", justifyContent: "center" }}>Continue →</button>
                  </div>
                )}

                {step === 4 && (
                  <div style={{ textAlign: "center", padding: "10px 0" }}>
                    <div style={{ width: 72, height: 72, borderRadius: 18, background: "var(--grad-iris-2)", margin: "0 auto 20px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, color: "#fff", boxShadow: "0 14px 32px -10px oklch(0.55 0.22 290 / 0.7)" }}>✓</div>
                    <div className="mono" style={{ fontSize: 11, color: "var(--green)", letterSpacing: "0.16em", marginBottom: 10 }}>● 2FA ENABLED</div>
                    <h2 style={{ fontSize: 24, fontWeight: 600, margin: "0 0 12px", letterSpacing: "-0.02em" }}>Your account is more secure.</h2>
                    <p style={{ fontSize: 14, color: "var(--text-3)", margin: "0 0 24px", maxWidth: 420, marginInline: "auto", lineHeight: 1.55 }}>
                      Next time you sign in, we'll ask for a 6-digit code after your password. We've emailed a security receipt confirming this change.
                    </p>
                    <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                      <a href="account.html" className="btn btn-iris">← Account settings</a>
                      <a href="/signup.html" className="btn btn-glass">Open workspace</a>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
