<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Notifications">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const NOTIFS = [
      { id: 1, kind: "team", icon: "@", color: "var(--violet-2)", title: "Theo mentioned you in MSA — Acme ↔ Helix Labs", body: "@Maya can you double-check the indemnification carve-outs before the partner review?", when: "5 min ago", unread: true, href: "/library.html" },
      { id: 2, kind: "ai", icon: "✦", color: "var(--green)", title: "Thread re-ran: 'What's new in NVDA Q3?'", body: "The new Q3 10-Q changed two material disclosures since your last check. View the diff.", when: "32 min ago", unread: true, href: "compare.html" },
      { id: 3, kind: "billing", icon: "◉", color: "var(--violet-2)", title: "Practice pack purchased — 400 credits added", body: "Receipt sent to your inbox. Credits never expire.", when: "2 hours ago", unread: true, href: "invoice.html" },
      { id: 4, kind: "security", icon: "🔒", color: "#ffbd2e", title: "New sign-in from Safari on iPhone", body: "From New York, NY. If this wasn't you, change your password.", when: "Today, 9:14 AM", unread: false, href: "account.html" },
      { id: 5, kind: "system", icon: "↻", color: "var(--text-3)", title: "Document ready: 'ATLAS-2 Phase III Protocol.pdf'", body: "220 pages indexed · auto-summary generated · OCR took 3.4s.", when: "Yesterday", unread: false, href: "/library.html" },
      { id: 6, kind: "product", icon: "★", color: "var(--green)", title: "New feature: Clause-diff v2 is live", body: "Diff against a folder of standard templates, not just one. See what's new.", when: "May 19", unread: false, href: "changelog.html" },
      { id: 7, kind: "team", icon: "+", color: "var(--violet-2)", title: "Iris Lee joined your workspace", body: "Iris accepted your invite and is now a Viewer.", when: "May 17", unread: false, href: "account.html" },
      { id: 8, kind: "ai", icon: "✦", color: "var(--green)", title: "Auto-summary refreshed for 4 documents", body: "We re-summarized 4 docs after a model update. Citations re-verified.", when: "May 15", unread: false, href: "library.html" },
    ];

    function App() {
      const [list, setList] = useState(NOTIFS);
      const [filter, setFilter] = useState("all");
      const filtered = filter === "unread" ? list.filter(n => n.unread) : filter === "all" ? list : list.filter(n => n.kind === filter);
      const unread = list.filter(n => n.unread).length;

      const markAll = () => { setList(list.map(n => ({ ...n, unread: false }))); window.cwpaToast?.({ kind: "success", title: "All marked as read" }); };
      const toggle = (id) => setList(list.map(n => n.id === id ? { ...n, unread: !n.unread } : n));

      const KINDS = [
        { k: "all", l: "All", n: list.length },
        { k: "unread", l: "Unread", n: unread },
        { k: "team", l: "Team", n: list.filter(n => n.kind === "team").length },
        { k: "ai", l: "Assistant", n: list.filter(n => n.kind === "ai").length },
        { k: "billing", l: "Billing", n: list.filter(n => n.kind === "billing").length },
        { k: "security", l: "Security", n: list.filter(n => n.kind === "security").length },
        { k: "system", l: "System", n: list.filter(n => n.kind === "system").length },
      ];

      return (
        <PageShell>
          <section style={{ padding: "50px 0 80px" }}>
            <div className="spread" style={{ maxWidth: 920 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16, marginBottom: 24 }}>
                <div>
                  <div className="section-eyebrow">Inbox</div>
                  <h1 className="section-title" style={{ fontSize: 36, margin: "12px 0 6px" }}>Notifications</h1>
                  <p style={{ fontSize: 13.5, color: "var(--text-3)", margin: 0 }}>{unread > 0 ? <><strong style={{ color: "var(--text)" }}>{unread} unread</strong> · {list.length} total</> : <>All caught up</>}</p>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={markAll} className="btn btn-glass btn-sm" disabled={unread === 0}>✓ Mark all read</button>
                  <a href="account.html" className="btn btn-glass btn-sm">⚙ Preferences</a>
                </div>
              </div>

              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 18 }}>
                {KINDS.map(k => (
                  <button key={k.k} onClick={() => setFilter(k.k)} className={filter === k.k ? "btn btn-iris btn-sm" : "btn btn-glass btn-sm"} style={{ gap: 6 }}>
                    {k.l} <span className="mono" style={{ opacity: 0.7, fontSize: 10 }}>{k.n}</span>
                  </button>
                ))}
              </div>

              {filtered.length === 0 ? (
                <div className="glass" style={{ padding: 60, borderRadius: "var(--r-xl)", textAlign: "center" }}>
                  <div style={{ width: 56, height: 56, borderRadius: 14, background: "var(--glass-2)", margin: "0 auto 16px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, color: "var(--green)" }}>✓</div>
                  <h3 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 6px" }}>You're all caught up.</h3>
                  <p style={{ fontSize: 13.5, color: "var(--text-3)", margin: 0 }}>Nothing in this filter.</p>
                </div>
              ) : (
                <div className="glass" style={{ borderRadius: "var(--r-xl)", overflow: "hidden" }}>
                  {filtered.map((n, i) => (
                    <a key={n.id} href={n.href} style={{ display: "block", padding: "18px 22px", borderTop: i > 0 ? "1px solid var(--stroke-1)" : "none", color: "var(--text)", position: "relative", background: n.unread ? "rgba(183,106,255,0.04)" : "transparent" }}>
                      <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                        <div style={{ width: 34, height: 34, borderRadius: 10, background: `${n.color}1f`, border: `1px solid ${n.color}55`, display: "flex", alignItems: "center", justifyContent: "center", color: n.color, fontSize: 14, flexShrink: 0 }}>{n.icon}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, marginBottom: 4 }}>
                            <div style={{ fontSize: 14, fontWeight: n.unread ? 600 : 500, color: "var(--text)" }}>{n.title}</div>
                            <div className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", letterSpacing: "0.06em", flexShrink: 0 }}>{n.when.toUpperCase()}</div>
                          </div>
                          <p style={{ fontSize: 13, color: "var(--text-3)", margin: 0, lineHeight: 1.55 }}>{n.body}</p>
                        </div>
                        <button onClick={e => { e.preventDefault(); toggle(n.id); }} style={{ background: "transparent", border: "none", color: "var(--text-4)", cursor: "pointer", fontSize: 13, padding: 4 }} title={n.unread ? "Mark as read" : "Mark as unread"}>{n.unread ? "●" : "○"}</button>
                      </div>
                    </a>
                  ))}
                </div>
              )}

              <div className="glass" style={{ marginTop: 24, padding: "16px 22px", borderRadius: "var(--r-lg)", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, fontSize: 13 }}>
                <span style={{ color: "var(--text-3)" }}>Want fewer of these? Customize notification preferences in account settings.</span>
                <a href="account.html" className="btn btn-glass btn-sm">Manage →</a>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
