<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared chat — CHATWITHPDFAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Shared chat">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      const messages = [
        { who: "user", t: "What's the indemnification cap?" },
        { who: "ai", t: "The cap is **2× annual fees**, with carve-outs for IP, confidentiality, and gross negligence. ¹ p.47", cite: "§ 12.3 · p. 47" },
        { who: "user", t: "What are the termination triggers?" },
        { who: "ai", t: "Three triggers: **material breach** with 30-day cure, insolvency, and change of control above 50% to a competitor. ¹ p.51", cite: "§ 14.2 · p. 51" },
        { who: "user", t: "Compare to our standard MSA template." },
        { who: "ai", t: "Four material differences: (1) indemnity cap is **0.5× lower** in this contract, (2) auto-renewal language is **new**, (3) governing law is Delaware vs. our standard NY, (4) **30-day** cure period instead of our standard 14.", cite: "diff · 4 clauses" },
      ];
      return (
        <>
          {/* Top bar */}
          <header style={{ borderBottom: "1px solid var(--stroke-1)", background: "rgba(5,6,20,0.8)", backdropFilter: "blur(20px)", position: "sticky", top: 0, zIndex: 10 }}>
            <div className="spread" style={{ display: "flex", alignItems: "center", padding: "14px 0", gap: 16, flexWrap: "wrap" }}>
              <a href="landing.html" className="brand"><span className="brand-mark">◇</span>chatwithpdfai<span className="domain">.com</span></a>
              <span className="pill" style={{ padding: "3px 10px", fontSize: 10.5 }}>● Read-only shared chat</span>
              <div style={{ flex: 1 }}></div>
              <span className="mono" style={{ fontSize: 11, color: "var(--text-3)", letterSpacing: "0.08em" }}>SHARED BY MAYA K. · MAY 20</span>
              <a href="/signup.html" className="btn btn-iris btn-sm">Create your own →</a>
            </div>
          </header>

          <section style={{ padding: "32px 0 80px" }}>
            <div className="spread">
              <div className="glass" style={{ padding: "20px 24px", borderRadius: "var(--r-lg)", marginBottom: 24 }}>
                <div className="eyebrow" style={{ marginBottom: 8 }}>Document</div>
                <h1 style={{ fontSize: 24, fontWeight: 600, margin: "0 0 6px", letterSpacing: "-0.02em" }}>Master Service Agreement — Acme ↔ Helix Labs</h1>
                <div style={{ display: "flex", gap: 14, fontSize: 12.5, color: "var(--text-3)" }}>
                  <span>213 pages</span><span>·</span><span>Legal · Contract</span><span>·</span><span>3 questions · 6 messages</span>
                </div>
              </div>

              {/* Chat history */}
              <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
                {messages.map((m, i) => m.who === "user" ? (
                  <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5 }}>
                    <div style={{ background: "var(--grad-iris-2)", color: "#fff", padding: "11px 16px", maxWidth: "75%", fontSize: 14.5, lineHeight: 1.5, borderRadius: "18px 18px 4px 18px", boxShadow: "0 8px 24px -8px oklch(0.55 0.22 290 / 0.5)", fontWeight: 500 }}>{m.t}</div>
                    <span className="mono" style={{ fontSize: 9.5, color: "var(--text-4)", letterSpacing: "0.1em" }}>MAYA K.</span>
                  </div>
                ) : (
                  <div key={i} style={{ maxWidth: "85%" }}>
                    <div className="eyebrow" style={{ marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ width: 18, height: 18, borderRadius: "50%", background: "var(--grad-iris-2)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: "#fff" }}>AI</span>
                      ASSISTANT · GROUNDED
                    </div>
                    <div className="glass" style={{ padding: "14px 18px", borderRadius: "18px 18px 18px 4px", borderLeft: "3px solid var(--violet)", fontSize: 14.5, lineHeight: 1.6 }} dangerouslySetInnerHTML={{ __html: m.t.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text);font-weight:600">$1</strong>') }}></div>
                    <div style={{ marginTop: 8 }}>
                      <span className="chip" style={{ fontSize: 10.5, padding: "3px 10px", fontFamily: "var(--mono)", letterSpacing: "0.08em" }}>↗ {m.cite}</span>
                    </div>
                  </div>
                ))}
              </div>

              {/* CTA */}
              <div className="glass glass-iris-border" style={{ marginTop: 40, padding: "28px 32px", borderRadius: "var(--r-xl)", textAlign: "center" }}>
                <h3 style={{ fontSize: 24, fontWeight: 600, margin: "0 0 8px", letterSpacing: "-0.02em" }}>Read your own PDFs with cited answers.</h3>
                <p style={{ fontSize: 14, color: "var(--text-3)", margin: "0 0 18px" }}>3 free, no card.  Pay per document. Credits never expire.</p>
                <a href="/signup.html" className="btn btn-iris btn-lg">Start free →</a>
              </div>
            </div>
          </section>

          <footer style={{ borderTop: "1px solid var(--stroke-1)", padding: "26px 0" }}>
            <div className="spread" style={{ display: "flex", justifyContent: "space-between", color: "var(--text-4)", fontSize: 11, flexWrap: "wrap", gap: 14 }}>
              <span className="mono" style={{ letterSpacing: "0.08em" }}>READ-ONLY SHARE · GENERATED MAY 20, 2026</span>
              <div style={{ display: "flex", gap: 16 }}>
                <a href="legal/privacy.html" style={{ color: "var(--text-3)" }}>Privacy</a>
                <a href="legal/terms.html" style={{ color: "var(--text-3)" }}>Terms</a>
                <a href="contact.html" style={{ color: "var(--text-3)" }}>Report</a>
              </div>
            </div>
          </footer>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
